kind = "web"
previewPath = "/"
title = "PowerCode AI"
version = "1.0.0"
id = "artifacts/code-writer"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18425

[services.development]
run = "pnpm --filter @workspace/code-writer run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/code-writer", "run", "build" ]
publicDir = "artifacts/code-writer/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18425"
BASE_PATH = "/"
